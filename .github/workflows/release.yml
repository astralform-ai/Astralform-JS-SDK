name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+-*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC identity for npm trusted publishing
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      # Trusted publishing (OIDC) requires npm CLI >= 11.5.1; Node 20 ships ~10.x.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Verify tag matches package version
        run: |
          PKG_VERSION=$(node -p "require('./packages/core/package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

      # Authenticates via the GitHub OIDC token against the trusted publisher
      # configured on npmjs.com (astralform-ai/Astralform-JS-SDK -> release.yml).
      # No NODE_AUTH_TOKEN; provenance is generated automatically.
      - name: Publish @astralform/js
        run: npm publish --access public
        working-directory: packages/core
